<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 260px;
    padding: 16px;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: #1f2937;
  }
  h1 {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 12px;
    color: #111827;
  }
  .status {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }
  .status--ok {
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }
  .status--inactive {
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fcd34d;
  }
  .status--error {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fca5a5;
  }
  .info {
    margin-top: 10px;
    font-size: 11px;
    color: #6b7280;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h1>Revizorro Diff</h1>
  <div id="status" class="status status--inactive">Проверяю...</div>
  <div id="info" class="info"></div>
  <script src="popup.js"></script>
</body>
</html>
